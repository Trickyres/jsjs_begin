<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>稼享指南｜多稼十分钟生活圈</title>
  <style>
    /*
      ==============================
      一、CSS 样式区
      ==============================
      CSS 负责“长什么样”：颜色、字体、卡片、地图、按钮、底部导航等。

      你可以先重点看：
      1. :root              统一管理颜色、圆角、阴影等全局变量
      2. .view              控制不同页面的显示/隐藏
      3. .hero              首页顶部大标题区域
      4. .map-shell         地图区域
      5. .bottom-nav        底部导航栏
      bg 页面总背景；paper 首页卡片背景；card 各种信息卡片背景；text 主要文字颜色；muted 次要文字颜色；
      line 分割线颜色；brand 品牌色；brand-2 品牌强调色；orange 购物暖橙；green 休闲绿色；blue 服务蓝色；
      brown 记忆棕红；purple 扩展紫；shadow 强阴影； shadow-soft：轻阴影；radius 圆角；
      safe-bottom 适配 iPhone 底部安全区域（防止底部导航被 iPhone 手势条挡住）。
      font-family：字体列表，逗号分隔。-apple-system 是苹果系统默认字体，BlinkMacSystemFont 是 Chrome 浏览器在 Mac 上的默认字体，Segoe UI 是 Windows 系统默认字体，PingFang SC、Hiragino Sans GB、Microsoft YaHei 都是常见的中文字体。

      如果只是改点位、电话、简介，一般不用动 CSS，主要改下方 JS 里的 POINTS / CONTACTS。

    */

    :root {
      --bg: #fff8ef; 
      --paper: #fffdf8;
      --card: rgba(255,255,255,.92);
      --text: #37281e;
      --muted: #8d7c70;
      --line: rgba(139, 95, 66, .14);
      --brand: #c7431f;
      --brand-2: #f2672a;
      --orange: #f59d32;
      --green: #78aa63;
      --blue: #5b91ca;
      --brown: #a85e48;
      --purple: #8764d9;
      --shadow: 0 16px 40px rgba(110, 76, 49, .14);
      --shadow-soft: 0 8px 22px rgba(110, 76, 49, .10);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    } 

    /*
      box-sizing: border-box 的作用：
      让元素的 width 包含 padding 和 border，布局时更直观。
      对初学者来说，可以理解为“宽度更好算”，这个计算方式就是按照由外往内计算的，明确了width之后就会向内作减法；
      。
    */
    * { box-sizing: border-box; }
    /*
      页面真正显示出来的内容；
      min-height: 100% 确保内容区至少占满整个屏幕高度，避免内容过少时页面顶部出现空白；
      100vh应该是更加稳妥的选择；
      背景是由css画出来的：
      第一层：左上角一团浅橙色光晕 在15% 4%位置，半径为28%透明度，颜色是rgba(255, 218, 169, .38)，向外渐变为透明
      第二层：右上角一团浅绿色光晕
      第三层：从上到下的米白渐变底色
      linear-graient是线性渐变；color整个网页默认文字用--text变量，也就是#37281e这个深棕色；
      html,body这里的意思是并列选择的意思 html和body都应用这些样式
      html中一定有

    */
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 15% 4%, rgba(255, 218, 169, .38), transparent 28%),
        radial-gradient(circle at 90% 12%, rgba(167, 204, 156, .22), transparent 24%),
        linear-gradient(180deg, #fff7e9 0%, #fffaf2 45%, #fdf6ec 100%);
      color: var(--text);
    }
    

    
    /*
      -webkit-font-smoothing: antialiased; # 在 WebKit 内核的浏览器（如 Safari 和 Chrome）中启用抗锯齿字体渲染，使字体边缘更平滑。
      antialiased 可以理解为“抗锯齿”。
      text-rendering: optimizeLegibility; 启用一些字体排版优化，比如字距、连字

      button,input：所有按钮和输入框，都继承父元素的字体。

    */
    body {
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    
    button, input { font-family: inherit; }

    /*
      .app 是整个手机 H5 的外壳。为了在电脑网页端看起来合理，让底部导航、地图、列表都放在一个页面里面。
      max-width: 430px 表示即使在电脑上打开，也会保持接近手机屏幕的宽度。
      .是一个class选择器，表示HTML中class属性包含app的元素；position: relative 让它成为一个定位上下文，方便内部绝对定位的元素（比如首页头图、地图点位信息卡片）以它为参考进行定位；overflow: hidden 隐藏超出 app 边界的部分，保持界面整洁；box-shadow 给 app 添加一个细微的边框阴影，让它在白色背景上更有层次感。
      .app理解为手机里的整个小应用
      relaticve定位：元素相对于其正常位置进行定位，可以使用top、right、bottom、left属性来调整位置，但不会脱离文档流。
      app成为内部绝对定位元素的参照物
      overflow的意思是 超出.app边界的内容隐藏掉
      box-shadow是给外壳加一圈淡淡的阴影
      */
    .app {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--bg);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(122, 88, 61, .08);
    }

    /*
      .view 是 app 内的一个子容器，表示一个独立的页面视图。每个页面视图都有自己的内容，当切换页面时，通过切换 active 类来显示或隐藏相应的视图。
      .是 class 的选择器
      .view 表示一个“页面”：首页、地图页、列表页、电话页。
      默认 display: none 隐藏；当有 active 类时才显示。
      animation: fadeIn（淡入动画） .18s ease（动画时长 0.18秒，动画速度是 ease）; 给页面切换添加一个淡入动画，让界面切换更流畅自然。
      JS 里的 setView() 函数就是通过切换 active 来切换页面。
    */
    .view {
      display: none;
      min-height: 100vh;
      padding: 18px 16px calc(96px + var(--safe-bottom));
      animation: fadeIn .18s ease;
    }

    .view.active { display: block; } /* 当 .view 元素具有 active 类时，display 就是 block 了，显示该页面视图 */
    /* fadeIn 是一个关键帧动画，定义了从透明度为 0 且向下偏移 8px，到透明度为 1 且回到原位的动画效果。 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 顶部导航栏  flex的意思是变成弹性布局即横向布局  flex的默认主轴是横向 不写 flex div块级元素通查会独占一行
    align-items: center 让导航栏内的元素垂直居中；gap: 12px 导航栏内元素之间的间距；min-height: 44px 导航栏的最小高度；margin-bottom: 10px 导航栏与下方内容的间距。
    section有语义，是一个独立内容区块；
    div 没有什么语义 是一个盒子
    class = 'view active' 这说明这个 HTML 元素有两个 class 名 view 和 active ；class 和 data-view 是两个属性
    .view 可以选中 clasa 中有 view 的元素 同时需要注意两个元素之间的空格是分隔符  .view.active 选中同时具有 view 和 active 的元素
    */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 44px;
      margin-bottom: 10px;
    }

    .back-btn,
    .icon-btn {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 14px;
      background: rgba(255,255,255,.68);
      color: var(--text);
      font-size: 20px;
      box-shadow: 0 4px 14px rgba(130, 91, 52, .08);
      cursor: pointer;
    }

    .topbar-title {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .02em;
    }

    /*
      首页头图区域。
      包括“稼享指南”标题、副标题、导语，以及用 CSS 画出来的街区插画。
    */
    .hero {
      position: relative;
      min-height: 340px;
      border-radius: 0 0 34px 34px;
      margin: -18px -16px 18px;
      padding: 58px 22px 18px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 248, 234, .95), rgba(255, 242, 220, .88)),
        radial-gradient(circle at 85% 20%, rgba(127, 166, 104, .18), transparent 25%);
      border-bottom: 1px solid rgba(170, 113, 65, .12);
    }

    .hero h1 {
      margin: 0 0 8px;
      color: var(--brand);
      font-size: 42px;
      line-height: 1;
      letter-spacing: .03em;
      font-weight: 900;
    }

    .hero h2 {
      margin: 0 0 12px;
      color: #4a3427;
      font-size: 17px;
      font-weight: 800;
    }

    .hero p {
      margin: 0;
      max-width: 230px;
      color: #70594a;
      font-size: 14px;
      line-height: 1.65;
      font-weight: 500;
    }

    .hero-badge {
      position: absolute;
      right: 12px;
      top: 72px;
      padding: 6px 5px;
      writing-mode: vertical-rl;
      letter-spacing: .1em;
      color: var(--brand);
      background: rgba(255, 255, 255, .72);
      border: 1px solid rgba(199, 67, 31, .14);
      border-radius: 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .street-illustration {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 185px;
      pointer-events: none;
    }

    /*  ::表示伪元素 可以通过 css 在特定的元素前生成一个虚拟元素
    : 一个冒号可以表示伪类.hover active 之类
    */
    .tree {
      position: absolute;
      right: 28px;
      bottom: 64px;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #bfd39d 0 18%, transparent 19%),
        radial-gradient(circle at 64% 32%, #adc988 0 18%, transparent 19%),
        radial-gradient(circle at 48% 58%, #9fbd77 0 24%, transparent 25%);
      filter: drop-shadow(0 10px 12px rgba(76,91,45,.12));
    }
    .tree::after {
      content: "";
      position: absolute;
      left: 45px;
      bottom: -36px;
      width: 9px;
      height: 54px;
      border-radius: 6px;
      background: #8e6240;
    }

    .building {
      position: absolute;
      bottom: 32px;
      border-radius: 8px 8px 0 0;
      border: 2px solid rgba(139, 82, 47, .28);
      background: linear-gradient(180deg, #e8a66c, #c7794d);
      box-shadow: inset 0 0 0 4px rgba(255,255,255,.15);
    }
    .building.b1 { left: 24px; width: 94px; height: 78px; background: linear-gradient(180deg, #cb6a40, #ad5136); }
    .building.b2 { left: 138px; width: 118px; height: 98px; background: linear-gradient(180deg, #dfb276, #b97b51); }
    .building.b3 { right: 88px; width: 70px; height: 70px; background: linear-gradient(180deg, #d59463, #a8644a); }
    .building::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 16px;
      width: 14px;
      height: 20px;
      border-radius: 3px;
      background: rgba(255,245,220,.8);
      box-shadow: 26px 0 rgba(255,245,220,.8), 52px 0 rgba(255,245,220,.75), 0 32px rgba(255,245,220,.7), 26px 32px rgba(255,245,220,.65);
    }

    .gate {
      position: absolute;
      left: -8px;
      bottom: 34px;
      width: 120px;
      height: 86px;
      opacity: .92;
    }
    .gate::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 110px;
      height: 18px;
      border-radius: 18px 18px 4px 4px;
      background: #7b4635;
      box-shadow: 0 8px 0 #bd6a3e;
      transform: skewX(-12deg);
    }
    .gate::after {
      content: "";
      position: absolute;
      left: 18px;
      bottom: 0;
      width: 16px;
      height: 72px;
      border-radius: 3px;
      background: #8c4c36;
      box-shadow: 64px 0 #8c4c36;
    }

    .road {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 44px;
      background: linear-gradient(180deg, rgba(229, 196, 156, .42), rgba(212, 176, 135, .36));
      clip-path: polygon(0 55%, 100% 0, 100% 100%, 0 100%);
    }

    .bird {
      position: absolute;
      width: 22px;
      height: 8px;
      border-top: 2px solid rgba(124, 92, 70, .28);
      border-radius: 50%;
      transform: rotate(-10deg);
    }
    .bird::after {
      content: "";
      position: absolute;
      right: -12px;
      top: -2px;
      width: 20px;
      height: 8px;
      border-top: 2px solid rgba(124, 92, 70, .28);
      border-radius: 50%;
      transform: rotate(20deg);
    }
    .bird.one { right: 92px; top: 74px; }
    .bird.two { right: 62px; top: 102px; transform: scale(.75) rotate(-8deg); }

    /*
      首页四个快捷入口：便民服务、生活购物、休闲游玩、多稼记忆。
      这些按钮不是写死在 HTML 里，而是由 JS 根据 CATEGORIES 自动生成。
    */
    .quick-card {
      position: relative;
      margin-top: -64px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 28px;
      padding: 18px 12px 14px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      z-index: 3;
    }

    .quick-item {
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      color: var(--text);
    }
    .quick-icon {
      width: 58px;
      height: 58px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      margin: 0 auto 8px;
      color: #fff;
      font-size: 25px;
      box-shadow: 0 10px 18px rgba(113, 68, 31, .12);
    }
    .quick-label {
      font-size: 13px;
      font-weight: 700;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 22px 2px 12px;
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 900;
    }
    .section-title::before {
      content: "";
      width: 5px;
      height: 18px;
      border-radius: 99px;
      background: linear-gradient(180deg, var(--brand-2), #f7a642);
    }
    .more-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
    }

    .recommend-card,
    .route-card,
    .place-card,
    .contact-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.72);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .recommend-card {
      display: grid;
      grid-template-columns: 148px 1fr;
      gap: 12px;
      padding: 12px;
      align-items: center;
    }

    .thumb-river, .thumb-street {
      min-height: 108px;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(180deg, #cce7ef 0 42%, #84b4ce 43% 55%, #e9cf93 56% 100%);
    }
    .thumb-river::before {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 90px;
      height: 52px;
      background: #acd083;
      border-radius: 0 70px 0 0;
      box-shadow: 45px -6px 0 rgba(142, 190, 109, .72);
    }
    .thumb-river::after {
      content: "";
      position: absolute;
      right: 20px;
      top: 18px;
      width: 10px;
      height: 48px;
      background: rgba(255,255,255,.55);
      box-shadow: -18px 14px 0 rgba(255,255,255,.45), 18px 9px 0 rgba(255,255,255,.5), -35px 24px 0 rgba(255,255,255,.4);
    }

    .recommend-content h3,
    .route-card h3 {
      margin: 0 0 6px;
      font-size: 16px;
      line-height: 1.25;
    }
    .recommend-content p,
    .route-card p {
      margin: 0 0 10px;
      color: #6d5b4e;
      font-size: 13px;
      line-height: 1.5;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .tag.service { color: #d44c22; background: #fff0e8; }
    .tag.shopping { color: #d48219; background: #fff4df; }
    .tag.leisure { color: #5a984e; background: #edf8e9; }
    .tag.memory { color: #9b4c3a; background: #fff0ec; }

    .route-card {
      margin-top: 14px;
      padding: 18px;
      background:
        linear-gradient(100deg, rgba(255, 238, 205, .96), rgba(255, 248, 230, .92)),
        radial-gradient(circle at 80% 55%, rgba(193, 122, 69, .18), transparent 26%);
      min-height: 112px;
      position: relative;
    }
    .route-card::after {
      content: "";
      position: absolute;
      right: 18px;
      bottom: 8px;
      width: 150px;
      height: 64px;
      background:
        linear-gradient(90deg, transparent 0 10%, rgba(166, 95, 61, .24) 10% 12%, transparent 12% 24%, rgba(166, 95, 61, .24) 24% 26%, transparent 26%),
        linear-gradient(180deg, transparent 0 48%, rgba(166, 95, 61, .32) 49% 53%, transparent 54%);
      opacity: .75;
      border-radius: 12px;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 12px;
      scrollbar-width: none;
    }
    .pill-row::-webkit-scrollbar { display: none; }
    .pill {
      flex: 0 0 auto;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid rgba(125, 82, 48, .12);
      background: rgba(255,255,255,.7);
      color: #5a4637;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(115, 79, 52, .05);
    }
    .pill.active {
      border-color: transparent;
      background: linear-gradient(180deg, #ff7a36, #ed4e20);
      color: #fff;
      box-shadow: 0 8px 20px rgba(237, 78, 32, .24);
    }

    /*
      地图外层容器。
      目前是“示意地图”，不是调用真实高德地图。
      地图上的点位由 JS 根据 POINTS 里的 x / y 坐标自动生成。
    */
    .map-shell {
      position: relative;
      height: min(64vh, 560px);
      min-height: 520px;
      margin: 0 -16px;
      overflow: hidden;
      border-top: 1px solid rgba(138, 96, 62, .1);
      border-bottom: 1px solid rgba(138, 96, 62, .1);
      background: #f5ead9;
    }

    .map-canvas {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(147, 203, 122, .45), transparent 18%),
        radial-gradient(circle at 88% 28%, rgba(125, 185, 207, .45), transparent 22%),
        linear-gradient(135deg, #f6ead7 0%, #f2e5d2 100%);
    }
    .map-canvas::before {
      content: "";
      position: absolute;
      inset: -20px;
      background:
        linear-gradient(28deg, transparent 0 41%, rgba(255,255,255,.95) 42% 45%, transparent 46% 100%),
        linear-gradient(92deg, transparent 0 46%, rgba(255,255,255,.8) 47% 49%, transparent 50% 100%),
        linear-gradient(150deg, transparent 0 35%, rgba(255,255,255,.82) 36% 38%, transparent 39% 100%),
        linear-gradient(62deg, transparent 0 56%, rgba(255,255,255,.72) 57% 59%, transparent 60% 100%),
        linear-gradient(0deg, transparent 0 27%, rgba(255,255,255,.82) 28% 30%, transparent 31% 100%),
        linear-gradient(0deg, transparent 0 68%, rgba(255,255,255,.78) 69% 71%, transparent 72% 100%);
      opacity: .95;
    }
    .river {
      position: absolute;
      right: -60px;
      top: -20px;
      width: 180px;
      height: 620px;
      background: linear-gradient(90deg, rgba(126, 191, 207, .32), rgba(87, 170, 205, .55));
      transform: rotate(14deg);
      border-left: 10px solid rgba(255,255,255,.55);
    }
    .park {
      position: absolute;
      left: -36px;
      top: 30px;
      width: 165px;
      height: 116px;
      border-radius: 34px;
      background: rgba(159, 204, 134, .52);
      transform: rotate(-15deg);
    }
    .park.two {
      left: auto;
      right: 42px;
      top: 248px;

    .marker {

<body>
  <!--
    ==============================
    二、HTML 页面结构区
    ==============================
    HTML 负责“页面有哪些东西”。

    本页面是一个单页 H5：
    1. data-view="home"  首页
    2. data-view="map"   地图页
    3. data-view="list"  点位列表页
    4. data-view="phone" 便民电话页

    section.view 管理每个页面视图
    div card button 管理等元素构成页面内容

    这些 section 同时存在，但一次只显示一个。
    JS 会给当前页面加 active 类，其余页面隐藏。
    street-illustration 是hero的背景图
  -->
  <main class="app" id="app">
    <!-- 首页：标题、导语、快捷入口、本周推荐 -->

      <article class="route-card" data-go="list">

        <p>社区服务一站式指南，快速熟悉居委、卫生、药房与生活配套。</p>

    </section>

    <!-- 地图页：分类筛选、示意地图、底部点位卡片 -->
    <section class="view" data-view="map">

      <div class="map-shell">

          <div class="river"></div>
          <div class="park"></div>
          <div class="park two"></div>
          <span class="map-label" style="left:54%;top:10%;transform:rotate(-8deg);">小东门街区</span>

          <span class="map-label" style="left:66%;top:26%;transform:rotate(-20deg);">滨江步道</span>
          <span class="map-label" style="left:63%;top:46%;">社区广场</span>

  <script>
    /**
     * ==============================
     * 三、JavaScript 交互逻辑区
     * ==============================
     * JavaScript 负责“能不能点、点了以后发生什么”。
     *
     * 本文件的运行逻辑可以简单理解为：
     * 1. 先准备数据：分类 CATEGORIES、点位 POINTS、电话 CONTACTS。
     * 2. 页面打开时执行 init()。
     * 3. init() 根据数据自动生成快捷入口、筛选按钮、地图点位、列表卡片和电话卡片。
     * 4. 用户点击按钮时，调用 setView() 切换页面，或调用 renderMap()/renderList() 刷新内容。
     *
     * 使用说明：
     * 1. 直接把本文件保存为 index.html，双击即可打开。
     * 2. 下方 POINTS 为点位数据，可按实际点位修改名称、地址、电话、经纬度等。
     * 3. x/y 用来控制示意地图上的点位位置，范围 0-100；lng/lat 用于跳转高德导航。
     * 4. 如果后续接入真实高德 JS API，可保留页面结构，只替换 map-shell 内部地图实现。
     */

    /*
      CATEGORIES：点位分类配置。

      key   ：程序内部使用的分类代码，不建议随便改。
      label ：筛选按钮上显示的短名称，例如“便民”。
      full  ：卡片上显示的完整名称，例如“便民服务”。
      icon  ：首页快捷入口和分类图标。
      color ：这一类点位的主题颜色。
    */
    const CATEGORIES = [
      { key: 'all', label: '全部', icon: '◎', color: '#f2672a' },
      { key: 'service', label: '便民', full: '便民服务', icon: '👥', color: '#f2672a' },
      { key: 'shopping', label: '购物', full: '生活购物', icon: '🛒', color: '#f59d32' },
      { key: 'leisure', label: '休闲', full: '休闲游玩', icon: '🌳', color: '#78aa63' },
      { key: 'memory', label: '记忆', full: '多稼记忆', icon: '🏛️', color: '#a85e48' }
    ];

    /*
      POINTS：最重要的点位数据。

      后续你真正做“稼享指南”时，主要就是改这里。
      每一个 { ... } 代表一个点位。

      字段说明：
      id       ：点位唯一编号，英文即可，不能重复。
      name     ：点位名称。
      category ：点位分类，要对应 CATEGORIES 里的 key，例如 service / shopping / leisure / memory。
      icon     ：点位图标，可以用 emoji，也可以后续换成图片图标。
      intro    ：一句话简介。
      address  ：地址。
      phone    ：电话，没有电话可以写“无”。
      hours    ：开放时间或服务时间。
      lng/lat  ：真实经纬度，用于点击“一键导航”后跳转高德地图。
      x/y      ：示意地图上的位置，范围 0-100；x 越大越靠右，y 越大越靠下。
    */
    
    /* 
    多稼居民委员会位置已更新（百度地图），请将其经纬度修改为：121.509382, 31.219165，xy 还没有更新

    社区口袋花园用了新的地址（青龙桥街与会馆街交叉口），经纬度用了商船会馆的经纬度
    */
    const POINTS = [
      {
        id: 'duojia-jwh',
        name: '多稼居民委员会',
        category: 'service',
        icon: '👥',
        intro: '居民咨询、社区活动报名、便民联系的重要窗口。',

        phone: '021-3376 6298',
        hours: '周一至周日 8:30-21:00',
        lng: 121.509382,
        lat: 31.219165,
        x: 52,
        y: 44
      },
      {
        id: 'health-station',
        name: '社区卫生服务中心',
        category: 'service',
        icon: '✚',
        intro: '基本医疗、健康咨询、慢病随访，提供居民身边的健康服务。',
        address: '陆家浜路525号',
        phone: '021-6377 0202',
        hours: '周一至周日 8:00-11:00,13:30-16:30',
        lng: 121.504448,
        lat: 31.218086,
        x: 38,
        y: 69
      },
      {
        id: 'street-office',
        name: '小东门街道办事处',
        category: 'service',
        icon: '🏢',
        intro: '街道事务办理、社区服务咨询，是居民处理日常事务的重要场所。',
        address: '白渡路 252号',
        phone: '021-6332 5638',
        hours: '周一至周五 8:30-11:30,13:30-17:00',
        lng: 121.507660,
        lat: 31.225680,
        x: 22,
        y: 40
      },
      {

    /*
      state：页面当前状态。

      view       ：当前显示哪个页面，home/map/list/phone。
      category   ：当前筛选的分类，all 表示全部。
      selectedId ：地图页当前选中的点位 id。
      search     ：列表页搜索框里的关键词。

      你可以把 state 理解为“网页当前记住的状态”。
    */
    const state = {
      view: 'home',
      category: 'all',
      selectedId: 'duojia-jwh',
      search: ''
    };

    /*
      下面两个是简写工具函数：
      $('选择器')  ：找到第一个匹配的元素。
      $$('选择器') ：找到所有匹配的元素，并转成数组。

      例如：
      $('#toast') 相当于 document.querySelector('#toast')。
    */
    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

    // 根据分类 key 找到对应分类信息，例如 service -> 便民服务。
    function getCategory(key) {
      return CATEGORIES.find(c => c.key === key) || CATEGORIES[0];
    }

    // 根据点位 id 找到对应点位信息，例如 duojia-jwh -> 多稼居民委员会。
    function getPoint(id) {
      return POINTS.find(p => p.id === id) || POINTS[0];
    }

    /*
      一键导航函数。
      点击“导航前往”后，拼接一个高德地图 URI，然后让浏览器跳转。
      手机里如果装了高德地图，通常会尝试打开 App；否则会打开网页地图。
    */
    function navigateToPoint(point) {
      const name = encodeURIComponent(point.name);
      const url = `https://uri.amap.com/navigation?to=${point.lng},${point.lat},${name}&mode=walk&policy=1&src=jiaxiang-guide&coordinate=gaode`;
      window.location.href = url;
    }

    // 页面底部黑色提示条，例如点击“我的”时弹出的说明。
    function showToast(text) {
      const toast = $('#toast');
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 2400);
    }

    /*
      切换页面函数。
      例如 setView('map') 就会显示地图页，隐藏其他页面。
      核心原理：给目标 section 添加 active 类，其他 section 去掉 active 类。
    */
    function setView(view) {
      state.view = view;
      $$('.view').forEach(v => v.classList.toggle('active', v.dataset.view === view));
      $$('.nav-item').forEach(item => item.classList.toggle('active', item.dataset.go === view));
      if (view === 'map') renderMap();
      if (view === 'list') renderList();
      if (view === 'phone') renderContacts();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /*
      切换分类筛选。
      category 可以是 all/service/shopping/leisure/memory。
      地图页和列表页都会用到这个函数。
    */
    function setCategory(category, targetView = state.view) {
      state.category = category;
      if (targetView === 'map') renderMap();
      if (targetView === 'list') renderList();
    }

    /*
      渲染首页四个快捷入口。
      这些入口根据 CATEGORIES 自动生成，所以你改 CATEGORIES 后，这里会自动跟着变。
    */
    function renderQuickEntries() {
      const quicks = CATEGORIES.filter(c => c.key !== 'all');
      $('#quickEntries').innerHTML = quicks.map(c => `
        <button class="quick-item" data-quick="${c.key}">
          <span class="quick-icon" style="background:${c.color}">${c.icon}</span>
          <span class="quick-label">${c.full}</span>
        </button>
      `).join('');

      $$('#quickEntries .quick-item').forEach(btn => {
        btn.addEventListener('click', () => {
          state.category = btn.dataset.quick;
          setView('list');
        });
      });
    }

    /*
      渲染分类筛选按钮。
      地图页和列表页各有一组筛选按钮，这个函数会同时更新两处。
    */
    function renderFilterRows() {
      const html = CATEGORIES.map(c => `<button class="pill ${state.category === c.key ? 'active' : ''}" data-category="${c.key}">${c.label}</button>`).join('');
      $('#mapFilters').innerHTML = html;
      $('#listFilters').innerHTML = html;

      $$('#mapFilters .pill').forEach(btn => btn.addEventListener('click', () => setCategory(btn.dataset.category, 'map')));
      $$('#listFilters .pill').forEach(btn => btn.addEventListener('click', () => setCategory(btn.dataset.category, 'list')));
    }

    /*
      根据“当前分类”和“搜索关键词”过滤点位。
      列表页搜索时主要靠这个函数返回符合条件的点位。
    */
    function filteredPoints() {
      const keyword = state.search.trim().toLowerCase();
      return POINTS.filter(p => {
        const categoryOk = state.category === 'all' || p.category === state.category;
        const text = `${p.name} ${p.intro} ${p.address} ${getCategory(p.category).full}`.toLowerCase();
        const keywordOk = !keyword || text.includes(keyword);
        return categoryOk && keywordOk;
      });
    }

    /*
      渲染地图页。
      做三件事：
      1. 刷新分类按钮。
      2. 根据 POINTS 数据在示意地图上生成 marker 点位。
      3. 渲染底部点位信息卡片。
    */
    function renderMap() {
      renderFilterRows();
      const canvas = $('#mapCanvas');
      $$('.marker', canvas).forEach(m => m.remove());

      const points = POINTS.filter(p => state.category === 'all' || p.category === state.category);
      if (!points.some(p => p.id === state.selectedId)) {
        state.selectedId = points[0]?.id || POINTS[0].id;
      }

      points.forEach(point => {
        const category = getCategory(point.category);
        const marker = document.createElement('button');
        marker.className = `marker ${point.id === state.selectedId ? 'active' : ''}`;
        marker.style.left = `${point.x}%`;
        marker.style.top = `${point.y}%`;
        marker.style.background = category.color;
        marker.dataset.id = point.id;
        marker.setAttribute('aria-label', point.name);
        marker.innerHTML = `<span>${point.icon}</span>`;
        marker.addEventListener('click', () => {
          state.selectedId = point.id;
          renderMap();
        });
        canvas.appendChild(marker);
      });

      renderSheet(getPoint(state.selectedId));
    }

    /*
      渲染地图底部的点位详情卡片。
      参数 point 就是当前选中的点位对象。
    */
    function renderSheet(point) {
      const category = getCategory(point.category);
      $('#mapSheet').innerHTML = `
        <div class="sheet-handle"></div>
        <div class="sheet-title-row">
          <h3>${point.name}</h3>
          <span class="tag ${point.category}">${category.full || category.label}</span>
          <button class="fav" aria-label="收藏">☆</button>
        </div>
        <p>${point.intro}</p>
        <div class="sheet-meta">
          <span>⌖ ${point.address}</span>
          <span>☎ ${point.phone}</span>
        </div>
        <div class="sheet-actions">
          <button class="btn btn-ghost" data-open-list="${point.id}">查看详情</button>
          <button class="btn btn-primary" data-nav="${point.id}">➤ 一键导航</button>
        </div>
      `;
      $('[data-nav]', $('#mapSheet')).addEventListener('click', () => navigateToPoint(point));
      $('[data-open-list]', $('#mapSheet')).addEventListener('click', () => {
        state.search = point.name;
        $('#searchInput').value = point.name;
        setView('list');
      });
      $('.fav', $('#mapSheet')).addEventListener('click', () => showToast('已加入常用点位示例。实际项目可接入本地存储或后台。'));
    }

    /*
      渲染点位列表页。
      根据当前分类和搜索关键词，生成一张张点位卡片。
    */
    function renderList() {
      renderFilterRows();
      const titleMap = {
        all: '全部点位',
        service: '便民服务',
        shopping: '生活购物',
        leisure: '休闲游玩',
        memory: '多稼记忆'
      };
      $('#listTitle').textContent = titleMap[state.category] || '点位列表';

      const list = $('#placeList');
      const points = filteredPoints();
      if (!points.length) {
        list.innerHTML = `<div class="empty">没有找到相关点位。可以换个关键词，或点击上方分类重新筛选。</div>`;
        return;
      }
      list.innerHTML = points.map(point => {
        const category = getCategory(point.category);
        return `
          <article class="place-card">
            <div class="place-icon" style="background:${category.color}">${point.icon}</div>
            <div class="place-main">
              <h3>${point.name}<span class="tag ${point.category}">${category.full || category.label}</span></h3>
              <p>${point.intro}</p>
              <div class="place-lines">
                <span>⌖ ${point.address}</span>
                <span>◷ ${point.hours}</span>
              </div>
              <div class="place-actions">
                <button class="btn btn-mini btn-ghost" data-view-map="${point.id}">⌖ 查看地图</button>
                <button class="btn btn-mini btn-primary" data-nav="${point.id}">➤ 导航前往</button>
              </div>
            </div>
          </article>
        `;
      }).join('');

      $$('[data-nav]', list).forEach(btn => btn.addEventListener('click', () => navigateToPoint(getPoint(btn.dataset.nav))));
      $$('[data-view-map]', list).forEach(btn => btn.addEventListener('click', () => {
        state.selectedId = btn.dataset.viewMap;
        setView('map');
      }));
    }

    /*
      渲染便民电话页。
      根据 CONTACTS 数据生成电话卡片。
    */
    function renderContacts() {
      $('#contactList').innerHTML = CONTACTS.map(c => `
        <article class="contact-card">
          <div class="contact-icon" style="background:${c.color}">${c.icon}</div>

            <h3>${c.name}</h3>

          <a class="btn btn-primary btn-mini" href="tel:${c.phone.replace(/\s/g, '')}">拨打</a>

      `).join('');
    }

    /*
      绑定点击事件。
      简单说，就是告诉网页：用户点击某个按钮后，应该执行什么动作。

      例如：
      - 点击底部“地图” -> setView('map')
      - 点击搜索框输入 -> renderList()
      - 点击说明按钮 -> showToast()
    */
    function bindEvents() {
      $$('[data-go]').forEach(btn => btn.addEventListener('click', () => setView(btn.dataset.go)));
      $$('[data-select-point]').forEach(card => card.addEventListener('click', () => {
        state.selectedId = card.dataset.selectPoint;
        setView('map');
      }));
      $('#searchInput').addEventListener('input', e => {
        state.search = e.target.value;
        renderList();
      });
      $('#mapTipBtn').addEventListener('click', () => showToast('当前为示意地图版本：点位位置可在 POINTS 的 x/y 字段中调整；导航使用经纬度跳转高德地图。'));
      $('#listTipBtn').addEventListener('click', () => showToast('列表支持分类筛选和关键词搜索。后续可接入真实点位库或后台管理。'));
      $('#locateBtn').addEventListener('click', () => showToast('已回到多稼十分钟生活圈中心点。实际项目可接入浏览器定位。'));
      $('#aboutBtn').addEventListener('click', () => showToast('稼享指南：面向新居民、社区居民和周边工作者的社区生活服务导览 H5。'));

   function buildAmapUrl(point) {
    // 如果后期补了 lng / lat，就可以直接步行导航
    if (point.lng && point.lat) {
      const name = encodeURIComponent(point.name);
      return `https://uri.amap.com/navigation?to=${point.lng},${point.lat},${name}&mode=walk&coordinate=gaode&callnative=1&src=jiaxiang-guide`;
    }

    // 如果暂时没有精确经纬度，就先用地点名 / 地址打开高德搜索
    const keyword = encodeURIComponent(point.address || `上海市黄浦区 ${point.name}`);
    return `https://uri.amap.com/search?keyword=${keyword}&city=上海&callnative=1&src=jiaxiang-guide`;
  }

   function renderImageMap() {
    const mapEl = document.querySelector("#duojiaMap");
    if (!mapEl) return;

    // 避免重复渲染热点
    mapEl.querySelectorAll(".map-hotspot").forEach(el => el.remove());

    MAP_IMAGE_POINTS.forEach(point => {
      const btn = document.createElement("button");
      btn.className = "map-hotspot";
      btn.style.setProperty("--x", `${point.x}%`);
      btn.style.setProperty("--y", `${point.y}%`);
      btn.dataset.id = point.id;
      btn.setAttribute("aria-label", point.name);

      btn.addEventListener("click", () => {
        selectImageMapPoint(point);
      });

      mapEl.appendChild(btn);
    });
  }

   function selectImageMapPoint(point) {
    document.querySelectorAll(".map-hotspot").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.id === point.id);
    });

    const sheet = document.querySelector("#placeSheet");
    if (!sheet) return;

    sheet.innerHTML = `
      <div class="sheet-handle"></div>

      <div class="place-main">
        <h3>${point.name}</h3>
        <p>${point.address || "暂无详细地址，可后续补充。"}</p>
      </div>

      <div class="meta">
        <span>点击“一键导航”后，将打开高德地图。</span>
      </div>

      <div class="sheet-actions">
        <button class="btn-primary" id="navBtn">一键导航</button>
        <button class="btn-ghost" id="copyBtn">复制名称</button>
      </div>
    `;

    document.querySelector("#navBtn").addEventListener("click", () => {
      showToast("正在打开高德地图");
      window.location.href = buildAmapUrl(point);
    });

    document.querySelector("#copyBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(point.name);
        showToast("已复制点位名称");
      } catch {
        showToast(point.name);
      }
    });
  }

    /*
      初始化函数。
      页面第一次打开时，只执行一次。
      它会把所有数据渲染到页面上，并绑定各种点击事件。
    */
    function init() {
      renderQuickEntries();
      renderFilterRows();
      // renderMap(); // zyf revise
      renderImageMap();
      renderList();
      renderContacts();
      bindEvents();
    }

    // 启动整个网页。
    init();
  </script>
</body>
