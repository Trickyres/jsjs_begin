<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 上面这一句是说根据设备的宽度,不自动缩放 -->
    <title>我的 CSS 练习</title>
    <link rel="stylesheet" href="zyfstyle.css">
    <!-- 引入 relation 是样式表，href 是路径 -->
</head>
<body>
 
    <div class="card">
        <!-- class 是分类管理的意思 -->
        <h1>Hello, CSS!</h1>
        <p>这是我用 VS Code 写的第一个样式卡片。</p>
        <button>点击我</button>
    </div>
 
</body>
</html>
